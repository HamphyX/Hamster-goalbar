<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  background: transparent;
}

/* Container */
.container {
  width: 320px;
  height: 320px;
  position: relative;
}

/* Circle mask */
.circle {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  border: 6px solid white;
}

/* Fill container */
.fill {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  transition: height 1s ease;
}

/* Waves */
.wave {
  position: absolute;
  width: 200%;
  height: 200%;
  left: -50%;
  top: -50%;
  background: #4ecdc4;
  border-radius: 40%;
  animation: wave 6s linear infinite;
  opacity: 0.8;
}

.wave2 {
  animation-duration: 10s;
  opacity: 0.5;
}

@keyframes wave {
  0% { transform: translateX(0) rotate(0deg); }
  100% { transform: translateX(50%) rotate(360deg); }
}

/* Hamster overlay */
.hamster {
  position: absolute;
  width: 200px;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  pointer-events: none;
}

/* Optional text */
.label {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
  color: white;
  font-weight: bold;
  text-shadow: 0 0 6px black;
}
</style>
</head>

<body>

<div class="container">
  <div class="circle">
    <div class="fill" id="fill">
      <div class="wave"></div>
      <div class="wave wave2"></div>
    </div>
  </div>

  <!-- Replace with your hamster image URL -->
  <img class="hamster" src="YOUR_HAMSTER.png">

  <div class="label" id="label">0%</div>
</div>

<script>
// URL params: ?goal=100&current=50
const params = new URLSearchParams(window.location.search);

let goal = parseFloat(params.get("goal")) || 100;
let current = parseFloat(params.get("current")) || 50;

let percent = Math.min((current / goal) * 100, 100);

document.getElementById("fill").style.height = percent + "%";
document.getElementById("label").innerText = Math.floor(percent) + "%";
</script>

</body>
</html>
