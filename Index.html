<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hamster Goal Widget</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.container {
  width: 320px;
  height: 320px;
  position: relative;
}

/* Circle container */
.circle {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  border: 6px solid white;
  position: relative;
  background: rgba(255,255,255,0.1);
}

/* Liquid fill */
.wave {
  position: absolute;
  width: 200%;
  height: 200%;
  left: -50%;
  background: #6ec5ff;
  border-radius: 40%;
  animation: wave 6s linear infinite;
  opacity: 0.8;
}

.wave2 {
  animation-duration: 10s;
  opacity: 0.5;
}

@keyframes wave {
  0% { transform: translateX(0) rotate(0deg); }
  100% { transform: translateX(50%) rotate(360deg); }
}

/* Fill wrapper */
.fill {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  transition: height 1s ease;
}

/* Hamster */
.hamster {
  position: absolute;
  width: 140px;
  left: 50%;
  transform: translateX(-50%);
  bottom: 10px;
  animation: bounce 2s infinite ease-in-out;
}

@keyframes bounce {
  0%,100% { transform: translate(-50%, 0); }
  50% { transform: translate(-50%, -10px); }
}

/* Text */
.label {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 45%;
  transform: translateY(-50%);
  color: white;
  font-weight: bold;
  font-size: 20px;
  text-shadow: 0 0 5px black;
}
</style>
</head>

<body>

<div class="container">
  <div class="circle">
    <div class="fill" id="fill">
      <div class="wave"></div>
      <div class="wave wave2"></div>
    </div>
  </div>

  <img class="hamster" src="https://i.imgur.com/8QfQYwL.png">
  <div class="label" id="label">0%</div>
</div>

<script>
// ===== SETTINGS FROM URL =====
// Example: ?goal=100&current=65
const params = new URLSearchParams(window.location.search);
let goal = parseFloat(params.get("goal")) || 100;
let current = parseFloat(params.get("current")) || 50;

// Calculate %
let percent = Math.min((current / goal) * 100, 100);

// Apply
document.getElementById("fill").style.height = percent + "%";
document.getElementById("label").innerText =
  Math.floor(percent) + "%";

// OPTIONAL: smooth auto animation demo
// remove this if using real data

  demo = (demo + 1) % 101;
  document.getElementById("fill").style.height = demo + "%";
  document.getElementById("label").innerText = demo + "%";

*/
</script>

</body>
</html>
